<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 350px;
        }
        h1 { color: #667eea; margin-bottom: 24px; text-align: center; }
        label { display: block; margin-bottom: 16px; color: #555; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px 14px;
            margin-top: 6px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="card">
    <h1>📝 Todo App</h1>
    <form th:action="@{/login}" method="post">
        <label>Username <input type="text" name="username" placeholder="Enter username"/></label>
        <label>Password <input type="password" name="password" placeholder="Enter password"/></label>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
