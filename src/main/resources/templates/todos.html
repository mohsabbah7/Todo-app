<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Todos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #667eea; margin-bottom: 24px; font-size: 28px; }
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .add-form input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        .add-form input:focus { border-color: #667eea; }
        .add-form button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        .todo-item {
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .todo-title { font-size: 16px; color: #333; }
        .todo-title.done { text-decoration: line-through; color: #aaa; }
        .actions { display: flex; gap: 8px; }
        .btn-complete {
            padding: 6px 12px;
            background: #4caf50;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-delete {
            padding: 6px 12px;
            background: #f44336;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
        }
        .logout {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 My Todos</h1>

    <form th:action="@{/todos/add/todo}" method="post" class="add-form">
        <input type="text" name="title" placeholder="What needs to be done?"/>
        <button type="submit">Add ✚</button>
    </form>

    <div th:each="todo : ${todos}">
        <div class="todo-item">
            <span class="todo-title" th:classappend="${todo.completed} ? 'done'" th:text="${todo.title}"></span>
            <div class="actions">
                <a th:href="@{/todos/complete/{id}(id=${todo.id})}" class="btn-complete">✅ Done</a>
                <a th:href="@{/todos/delete/{id}(id=${todo.id})}" class="btn-delete">❌ Delete</a>
            </div>
        </div>
    </div>

    <a href="/logout" class="logout">🚪 Logout</a>
</div>
</body>
</html>
